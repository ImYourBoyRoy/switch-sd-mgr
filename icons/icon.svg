<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bezel" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#141923"/>
      <stop offset="0.5" stop-color="#242C3D"/>
      <stop offset="1" stop-color="#0B0E14"/>
    </linearGradient>

    <linearGradient id="sdBody" x1="80" y1="60" x2="176" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E293B"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>

    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00FFFF"/>
      <stop offset="1" stop-color="#0088CC"/>
    </linearGradient>

    <linearGradient id="glass" x1="32" y1="32" x2="224" y2="224" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="0.4" stop-color="#FFFFFF" stop-opacity="0.02"/>
      <stop offset="0.6" stop-color="#FFFFFF" stop-opacity="0.01"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.08"/>
    </linearGradient>

    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="256" height="256" rx="48" fill="#0D1117"/>
  <rect x="8" y="8" width="240" height="240" rx="40" fill="url(#bezel)" stroke="#004466" stroke-width="2"/>

  <g stroke="#00AEEF" stroke-width="1.5" stroke-opacity="0.3" fill="none">
    <path d="M 40 128 L 60 128 L 80 108 L 80 40"/>
    <path d="M 216 160 L 190 160 L 170 180 L 170 216"/>
    <circle cx="80" cy="40" r="3" fill="#00AEEF" fill-opacity="0.3"/>
    <circle cx="170" cy="216" r="3" fill="#00AEEF" fill-opacity="0.3"/>
  </g>

  <rect x="28" y="28" width="200" height="200" rx="32" fill="url(#glass)" filter="url(#dropShadow)"/>
  <rect x="28" y="28" width="200" height="200" rx="32" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.2"/>

  <g transform="translate(0, -5)">
    <path d="M 80 70 L 105 70 L 120 85 L 176 85 C 180.4 85 184 88.6 184 93 L 184 186 C 184 190.4 180.4 194 176 194 L 80 194 C 75.6 194 72 190.4 72 186 L 72 78 C 72 73.6 75.6 70 80 70 Z" fill="url(#sdBody)" stroke="#00FFFF" stroke-width="1.5" stroke-opacity="0.5"/>
    
    <path d="M 72 165 L 78 165 M 72 175 L 78 175" stroke="#00FFFF" stroke-width="1.5" stroke-opacity="0.5"/>

    <g fill="url(#gold)" filter="url(#neon)">
      <rect x="82" y="70" width="8" height="22" rx="2"/>
      <rect x="94" y="70" width="8" height="22" rx="2"/>
      <rect x="106" y="76" width="8" height="16" rx="2"/>
      <rect x="118" y="86" width="8" height="18" rx="2"/>
      <rect x="130" y="86" width="8" height="18" rx="2"/>
      <rect x="142" y="86" width="8" height="18" rx="2"/>
      <rect x="154" y="86" width="8" height="18" rx="2"/>
      <rect x="166" y="86" width="8" height="18" rx="2"/>
    </g>

    <text x="128" y="150" font-family="Arial, sans-serif" font-size="36" font-weight="900" letter-spacing="2" fill="#00FFFF" text-anchor="middle" filter="url(#neon)">SD</text>
  </g>

  <g transform="translate(170, 180)" filter="url(#neon)">
    <circle cx="0" cy="0" r="30" fill="#0D1117"/>
    <circle cx="0" cy="0" r="26" stroke="#00AEEF" stroke-width="3" fill="none"/>
    <circle cx="0" cy="0" r="26" stroke="#00FFFF" stroke-width="3" fill="none" stroke-dasharray="120" stroke-dashoffset="20"/>
    
    <path d="M 0 -12 L 12 2 L 4 2 L 4 12 L -4 12 L -4 2 L -12 2 Z" fill="#00FFFF"/>
  </g>

</svg>
