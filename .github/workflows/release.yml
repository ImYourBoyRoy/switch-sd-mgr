name: Build and Release

# Triggers on any tag matching v* (e.g. v7.0.1)
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64 → produces: .msi + NSIS .exe installer
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis,msi

          # macOS universal → produces: .dmg (runs on both Intel and Apple Silicon)
          - platform: macos-latest
            target: universal-apple-darwin
            bundles: dmg

          # Linux x64 → produces: .deb + .AppImage
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Switch SD Updater ${{ github.ref_name }}"
          releaseBody: |
            ## Switch SD Updater ${{ github.ref_name }}

            Cross-platform automated release.

            ### Downloads
            | Platform | File | Notes |
            |---|---|---|
            | Windows | `*-setup.exe` | Recommended NSIS installer |
            | Windows | `*.msi` | MSI installer (for enterprise/SCCM) |
            | macOS | `*.dmg` | Universal binary (Intel + Apple Silicon) |
            | Linux | `*.AppImage` | Portable — no install needed |
            | Linux | `*.deb` | Debian/Ubuntu package |

            > **First time?** See the [README](https://github.com/ImYourBoyRoy/switch-sd-mgr#readme) for setup instructions.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
