name: Build and Release

# Triggers on any tag matching v* (e.g. v7.0.1)
on:
  push:
    tags:
      - 'v*'

# Opt into Node.js 24 for all actions before the forced June 16 2026 deadline
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64 → produces: NSIS .exe installer (plus our manual portable ZIP)
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            rust_targets: x86_64-pc-windows-msvc
            bundles: nsis

          # macOS Universal Binary → produces: .dmg (runs on Intel + Apple Silicon)
          # Note: 'universal-apple-darwin' is a Tauri pseudo-target. Rustup needs
          # the two real targets installed; Tauri's CLI lipo-merges the outputs.
          - platform: macos-latest
            target: universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            bundles: dmg

          # Linux x64 → produces: .AppImage + .deb
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            rust_targets: x86_64-unknown-linux-gnu
            bundles: deb,appimage

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Install the actual rustup targets (not Tauri pseudo-targets)
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Switch SD Manager ${{ github.ref_name }}"
          releaseBody: |
            ## Switch SD Manager ${{ github.ref_name }}

            Cross-platform automated release.

            ### Downloads
            | Platform | File | Notes |
            |---|---|---|
            | Windows | `Switch-SD-Manager_Windows_Portable.zip` | **Portable (Recommended)** — Extract and run anywhere! |
            | Windows | `*-setup.exe` | NSIS installer format |
            | macOS | `*.dmg` | Universal binary (Intel + Apple Silicon) |
            | Linux | `*.AppImage` | Portable — no install needed, mark executable first |
            | Linux | `*.deb` | Debian/Ubuntu package |

            > **First time?** See the [README](https://github.com/ImYourBoyRoy/switch-sd-mgr#readme) for setup instructions.
          releaseDraft: false
          prerelease: false
          # 'target' here is the Tauri build target (universal-apple-darwin is valid here)
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Package and Upload Windows Portable Zip
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $exePath = "src-tauri/target/release/switch-sd-mgr.exe"
          if (-not (Test-Path $exePath)) {
            $exePath = "src-tauri/target/x86_64-pc-windows-msvc/release/switch-sd-mgr.exe"
          }
          if (Test-Path $exePath) {
            $zipPath = "src-tauri/target/release/Switch-SD-Manager_Windows_Portable.zip"
            # Ensure output dir exists
            New-Item -ItemType Directory -Force -Path "src-tauri/target/release"
            Compress-Archive -Path $exePath -DestinationPath $zipPath -Force
            Write-Host "Created portable ZIP at $zipPath"
            
            # Upload the ZIP file directly to the release
            gh release upload ${{ github.ref_name }} $zipPath --clobber
          } else {
            Write-Error "Could not find raw executable"
            exit 1
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
